name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9.15.4

jobs:
  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  brand-compliance:
    name: Brand compliance checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no exclamation marks in UI copy
        run: |
          # Exclude test files and comments
          if grep -rn '！\|!' apps/mobile/app apps/mobile/src/components packages/ui/src/components \
            --include="*.tsx" --include="*.ts" \
            | grep -v "//.*!" \
            | grep -v "test\|spec\|story" \
            | grep "'[^']*!"; then
            echo "FAIL: Exclamation marks found in UI copy"
            exit 1
          fi
          echo "PASS: No exclamation marks found"

      - name: Check no elevation/shadowColor
        run: |
          if grep -rn 'elevation\|shadowColor\|shadowOffset\|shadowOpacity\|shadowRadius' \
            apps/mobile/app apps/mobile/src packages/ui/src \
            --include="*.tsx" --include="*.ts"; then
            echo "FAIL: Shadow/elevation styles found"
            exit 1
          fi
          echo "PASS: No shadow styles found"

      - name: Check no hardcoded hex colors
        run: |
          if grep -rn "'#[0-9A-Fa-f]\{6\}'" \
            apps/mobile/app apps/mobile/src packages/ui/src \
            --include="*.tsx" --include="*.ts" \
            | grep -v "// "; then
            echo "WARN: Hardcoded hex colors may exist — review output"
          fi
          echo "CHECK complete"
