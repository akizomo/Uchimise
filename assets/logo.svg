<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 230" width="320" height="230" role="img" aria-label="Uchimise">

  <!--
    家シルエット + 暖簾の空抜き
    ・背面に ochre/honey を敷く
    ・家シルエット（espresso）を fill-rule=evenodd で重ねて暖簾形状を抜く
  -->

  <!-- 暖簾の色（背面）: 上平・下半円 -->
  <path d="M118,62 h24 v44 a12 12 0 0 1 -24 0 Z" fill="#EF9F27"/>
  <path d="M148,62 h24 v44 a12 12 0 0 1 -24 0 Z" fill="#FAC775"/>
  <path d="M178,62 h24 v44 a12 12 0 0 1 -24 0 Z" fill="#EF9F27"/>

  <!-- 家シルエット（空抜き）-->
  <path
    fill="#2A1600"
    fill-rule="evenodd"
    d="M160,20 L98,62 L112,62 L112,118 L208,118 L208,62 L222,62 Z
       M118,62 h24 v44 a12 12 0 0 1 -24 0 Z
       M148,62 h24 v44 a12 12 0 0 1 -24 0 Z
       M178,62 h24 v44 a12 12 0 0 1 -24 0 Z"
  />

  <!-- ワードマーク -->
  <text
    x="160" y="150"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="700" font-size="42" fill="#2A1600"
    text-anchor="middle" letter-spacing="-1"
  >Uchimise</text>

  <!-- タグライン -->
  <text
    x="160" y="184"
    font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif"
    font-weight="300" font-size="13" fill="#633806"
    text-anchor="middle" letter-spacing="2"
  >うちのお店、開けよう。</text>

</svg>
